<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CryptoAI Pro - منصة التداول الذكي</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- شاشة البداية Splash -->
    <div id="splash">
        <div class="splash-content">
            <img src="assets/logo.svg" alt="CryptoAI Pro" class="splash-logo">
            <h1 class="splash-title">CryptoAI Pro v6.0</h1>
            <div class="splash-loader"></div>
            <p class="splash-sub">أكثر من 2000 ميزة ذكية</p>
        </div>
    </div>

    <!-- صفحات المصادقة -->
    <div id="authContainer" class="auth-container">
        <!-- نموذج تسجيل الدخول -->
        <div id="loginForm" class="auth-form active">
            <h2>تسجيل الدخول</h2>
            <input type="email" id="loginEmail" placeholder="البريد الإلكتروني" class="input-field">
            <input type="password" id="loginPassword" placeholder="كلمة المرور" class="input-field">
            <button onclick="login()" class="btn-primary">دخول</button>
            <p>ليس لديك حساب؟ <a href="#" onclick="showRegister()">إنشاء حساب</a></p>
            <div class="social-login">
                <button onclick="googleLogin()" class="btn-google">Google</button>
                <button onclick="telegramLogin()" class="btn-telegram">Telegram</button>
            </div>
        </div>
        <!-- نموذج التسجيل -->
        <div id="registerForm" class="auth-form">
            <h2>إنشاء حساب جديد</h2>
            <input type="text" id="regName" placeholder="الاسم الكامل" class="input-field">
            <input type="email" id="regEmail" placeholder="البريد الإلكتروني" class="input-field">
            <input type="tel" id="regPhone" placeholder="رقم الهاتف (اختياري)" class="input-field">
            <input type="password" id="regPassword" placeholder="كلمة المرور" class="input-field">
            <input type="password" id="regPasswordConfirm" placeholder="تأكيد كلمة المرور" class="input-field">
            <button onclick="register()" class="btn-primary">تسجيل</button>
            <p>لديك حساب؟ <a href="#" onclick="showLogin()">تسجيل الدخول</a></p>
        </div>
        <!-- نموذج OTP -->
        <div id="otpForm" class="auth-form">
            <h2>تأكيد الحساب</h2>
            <p>تم إرسال رمز التحقق إلى بريدك الإلكتروني</p>
            <div class="otp-inputs">
                <input type="text" maxlength="1" class="otp-digit" oninput="moveOtp(this)">
                <input type="text" maxlength="1" class="otp-digit" oninput="moveOtp(this)">
                <input type="text" maxlength="1" class="otp-digit" oninput="moveOtp(this)">
                <input type="text" maxlength="1" class="otp-digit" oninput="moveOtp(this)">
                <input type="text" maxlength="1" class="otp-digit" oninput="moveOtp(this)">
                <input type="text" maxlength="1" class="otp-digit" oninput="moveOtp(this)">
            </div>
            <button onclick="verifyOTP()" class="btn-primary">تأكيد</button>
        </div>
    </div>

    <!-- التطبيق الرئيسي (يظهر بعد تسجيل الدخول) -->
    <div id="appContainer" style="display:none;">
        <!-- الهيدر -->
        <header class="app-header">
            <div class="logo">
                <img src="assets/logo.svg" alt="CryptoAI" width="32">
                <span>CryptoAI Pro</span>
            </div>
            <div class="header-actions">
                <button class="icon-btn" onclick="toggleNotifications()">🔔</button>
                <button class="icon-btn" onclick="showProfile()">👤</button>
            </div>
        </header>

        <!-- المحتوى الرئيسي -->
        <main id="mainContent" class="main-content">
            <!-- الصفحات تتحمل هنا ديناميكياً -->
            <div id="pageContainer"></div>
        </main>

        <!-- القائمة السفلية -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-page="dashboard" onclick="loadPage('dashboard')">📊 لوحة التحكم</button>
            <button class="nav-item" data-page="trade" onclick="loadPage('trade')">⚡ تداول</button>
            <button class="nav-item" data-page="signals" onclick="loadPage('signals')">🤖 إشارات</button>
            <button class="nav-item" data-page="community" onclick="loadPage('community')">👥 مجتمع</button>
            <button class="nav-item" data-page="profile" onclick="loadPage('profile')">👤 حسابي</button>
        </nav>
    </div>

    <!-- المودالات -->
    <div id="modalContainer" class="modal-container"></div>

    <!-- الإشعارات -->
    <div id="toast" class="toast"></div>

    <!-- ملفات JavaScript -->
    <script src="js/api.js"></script>
    <script src="js/components.js"></script>
    <script src="js/app.js"></script>
    <script src="js/tradingview.js"></script>
</body>
</html>
