<!DOCTYPE html>
<html>
<body>

<h2>AI Trading Bot</h2>

<button onclick="start()">▶️ تشغيل</button>
<button onclick="stop()">⏹️ إيقاف</button>

<p id="info"></p>

<script>
const url = "https://YOUR-APP.up.railway.app";

async function start() {
    await fetch(url + "/start", { method: "POST" });
}

async function stop() {
    await fetch(url + "/stop", { method: "POST" });
}

async function load() {
    let r = await fetch(url + "/status");
    let d = await r.json();

    document.getElementById("info").innerText =
        "Users: " + d.users + " | Profit: " + d.profit + " | Running: " + d.running;
}

setInterval(load, 3000);
</script>

</body>
</html>
