<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Trading Lab AI</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🧪 Trading Lab AI</h1>

<div class="container">

<select id="symbol">
  <option value="BTCUSDT">BTC</option>
  <option value="ETHUSDT">ETH</option>
  <option value="BNBUSDT">BNB</option>
</select>

<select id="platform">
  <option>Binance</option>
  <option>Pocket Option</option>
</select>

<br>

<button onclick="startBot()">▶ تشغيل</button>
<button class="stop" onclick="stopBot()">⛔ إيقاف</button>

<h3 id="status">متوقف</h3>

<div class="card">
  <p>الإشارة: <span id="signal">--</span></p>
  <p>القوة: <span id="strength">--</span></p>
  <p>الثقة: <span id="confidence">--</span></p>
  <p>المؤشرات: <span id="agree">0</span></p>
  <p>وقت الصفقة: <span id="time">--</span></p>
</div>

<div class="card">
  <h3>📊 النتائج</h3>
  <p>Wins: <span id="wins">0</span></p>
  <p>Losses: <span id="losses">0</span></p>
</div>

<button class="win" onclick="recordWin()">ربح ✅</button>
<button class="loss" onclick="recordLoss()">خسارة ❌</button>

</div>

<script src="script.js"></script>
</body>
</html>
