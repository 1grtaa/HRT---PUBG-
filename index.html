<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>AI Trading Pro</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="dashboard">

    <h1>🤖 AI Trading Pro</h1>

    <input id="api" placeholder="API KEY">
    <input id="secret" placeholder="SECRET">

    <button onclick="start()">🚀 ابدأ التداول</button>

    <h2 id="signal">--</h2>

</div>

<script>
async function start() {

    let api = document.getElementById("api").value;
    let secret = document.getElementById("secret").value;

    let res = await fetch("http://localhost:3000/start", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ api, secret })
    });

    let data = await res.json();

    document.getElementById("signal").innerText = data.signal;
}
</script>

</body>
</html>        <h2>لوحة التحكم AI</h2>
        <div class="charts">
            <canvas id="candlestickChart"></canvas>
        </div>
        <div class="signals">
            <h3>إشارات التداول</h3>
            <ul id="signal-list"></ul>
        </div>
        <div class="indicators">
            <h3>المؤشرات التقنية المستخدمة</h3>
            <ul>
                <li>1️⃣ Moving Average (MA)</li>
                <li>2️⃣ Bollinger Bands</li>
                <li>3️⃣ RSI</li>
                <li>4️⃣ MACD</li>
                <li>5️⃣ Volume Analysis</li>
            </ul>
        </div>
    </section>

    <!-- المحفظة -->
    <section class="wallet">
        <h2>المحفظة 💰</h2>
        <div class="wallet-actions">
            <button class="btn-glow" onclick="deposit()">إيداع</button>
            <button class="btn-glow" onclick="withdraw()">سحب</button>
            <button class="btn-glow" onclick="send()">إرسال</button>
        </div>
    </section>

    <!-- الأخبار -->
    <section class="news">
        <h2>آخر الأخبار 📰</h2>
        <ul id="news-list"></ul>
    </section>

    <footer>
        <p>© 2026 AHMD SN | منصة تداول AI MAX PRO</p>
    </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>
</body>
  </html>
