<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoAI Pro - منصة التداول بالذكاء الاصطناعي</title>
    
    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0b0e11;
            --bg-secondary: #1e2329;
            --bg-tertiary: #2b3139;
            --text-primary: #eaecef;
            --text-secondary: #848e9c;
            --accent-green: #0ecb81;
            --accent-red: #f6465d;
            --accent-blue: #f0b90b;
            --border-color: #2b3139;
            --neon-glow: 0 0 10px rgba(240, 185, 11, 0.5);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow-x: hidden;
            direction: rtl;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);        }

        ::-webkit-scrollbar-thumb {
            background: var(--bg-tertiary);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-blue);
        }

        /* Animations */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 5px var(--accent-blue); }
            50% { box-shadow: 0 0 20px var(--accent-blue), 0 0 30px var(--accent-blue); }
        }

        @keyframes slideIn {
            from { transform: translateX(-100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .animate-pulse { animation: pulse 2s infinite; }
        .animate-glow { animation: glow 2s infinite; }
        .animate-slide-in { animation: slideIn 0.3s ease-out; }

        /* Header */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 24px;            font-weight: bold;
            color: var(--accent-blue);
            text-shadow: var(--neon-glow);
        }

        .logo i {
            font-size: 32px;
        }

        .nav-menu {
            display: flex;
            gap: 24px;
            align-items: center;
        }

        .nav-item {
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-item:hover {
            background: var(--bg-tertiary);
            color: var(--accent-blue);
        }

        .nav-item.active {
            background: var(--accent-blue);
            color: var(--bg-primary);
        }

        /* Main Container */
        .container {
            max-width: 1920px;
            margin: 0 auto;
            padding: 20px;
        }

        .grid {
            display: grid;
            gap: 20px;
        }

        .grid-2 { grid-template-columns: repeat(2, 1fr); }
        .grid-3 { grid-template-columns: repeat(3, 1fr); }
        .grid-4 { grid-template-columns: repeat(4, 1fr); }
        /* Cards */
        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
        }

        .card:hover {
            border-color: var(--accent-blue);
            box-shadow: 0 0 20px rgba(240, 185, 11, 0.1);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Buttons */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .btn-primary {
            background: var(--accent-blue);
            color: var(--bg-primary);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(240, 185, 11, 0.3);
        }

        .btn-success {
            background: var(--accent-green);
            color: white;
        }

        .btn-danger {
            background: var(--accent-red);
            color: white;
        }

        .btn-block {
            width: 100%;
            justify-content: center;
        }

        /* Trading Panel */
        .trading-panel {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
        }

        .chart-container {
            height: 600px;
            position: relative;
        }

        .order-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .order-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .order-tab {
            flex: 1;
            padding: 12px;
            background: var(--bg-tertiary);
            border: none;            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .order-tab.active.buy {
            background: var(--accent-green);
            color: white;
        }

        .order-tab.active.sell {
            background: var(--accent-red);
            color: white;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        /* Market Data */
        .market-ticker {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            padding: 12px 0;            margin-bottom: 20px;
        }

        .ticker-item {
            flex-shrink: 0;
            padding: 12px 20px;
            background: var(--bg-secondary);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: all 0.3s;
        }

        .ticker-item:hover {
            border-color: var(--accent-blue);
            transform: translateY(-2px);
        }

        .ticker-symbol {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .ticker-price {
            font-size: 18px;
            font-weight: bold;
        }

        .ticker-change {
            font-size: 12px;
            margin-top: 4px;
        }

        .text-green { color: var(--accent-green); }
        .text-red { color: var(--accent-red); }

        /* AI Analysis Panel */
        .ai-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 16px;
            margin-top: 20px;
        }

        .ai-indicator {
            background: var(--bg-tertiary);
            padding: 16px;
            border-radius: 8px;
            border-right: 3px solid var(--accent-blue);
        }
        .ai-indicator.buy {
            border-right-color: var(--accent-green);
        }

        .ai-indicator.sell {
            border-right-color: var(--accent-red);
        }

        .ai-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .ai-value {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .ai-signal {
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        .signal-strong-buy {
            background: rgba(14, 203, 129, 0.2);
            color: var(--accent-green);
        }

        .signal-buy {
            background: rgba(14, 203, 129, 0.1);
            color: var(--accent-green);
        }

        .signal-neutral {
            background: rgba(132, 142, 156, 0.2);
            color: var(--text-secondary);
        }

        .signal-sell {
            background: rgba(246, 70, 93, 0.1);
            color: var(--accent-red);
        }

        .signal-strong-sell {            background: rgba(246, 70, 93, 0.2);
            color: var(--accent-red);
        }

        /* Order Book */
        .order-book {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            font-size: 12px;
        }

        .order-book-header {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            background: var(--bg-tertiary);
            border-radius: 4px;
            margin-bottom: 8px;
            color: var(--text-secondary);
        }

        .order-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 8px;
            margin-bottom: 2px;
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .order-row:hover {
            background: var(--bg-tertiary);
        }

        .order-row.bid {
            background: rgba(14, 203, 129, 0.1);
        }

        .order-row.ask {
            background: rgba(246, 70, 93, 0.1);
        }

        /* Positions Table */
        .positions-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
        }
        .positions-table th,
        .positions-table td {
            padding: 12px;
            text-align: right;
            border-bottom: 1px solid var(--border-color);
        }

        .positions-table th {
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
        }

        .positions-table tr:hover {
            background: var(--bg-tertiary);
        }

        /* Notifications */
        .notification {
            position: fixed;
            top: 80px;
            left: 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            z-index: 2000;
            min-width: 300px;
            animation: slideIn 0.3s ease-out;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .notification.success {
            border-right: 3px solid var(--accent-green);
        }

        .notification.error {
            border-right: 3px solid var(--accent-red);
        }

        .notification.warning {
            border-right: 3px solid var(--accent-blue);
        }

        /* Modal */        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 3000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            animation: slideIn 0.3s ease-out;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-title {
            font-size: 24px;
            font-weight: bold;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
        }
        .modal-close:hover {
            color: var(--text-primary);
        }

        /* Auth Forms */
        .auth-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .auth-tab {
            flex: 1;
            padding: 12px;
            background: var(--bg-tertiary);
            border: none;
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .auth-tab.active {
            background: var(--accent-blue);
            color: var(--bg-primary);
        }

        .social-login {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }

        .btn-social {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-tertiary);
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }
        .btn-social:hover {
            background: var(--bg-primary);
            border-color: var(--accent-blue);
        }

        /* Loading Spinner */
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .trading-panel {
                grid-template-columns: 1fr;
            }
            
            .grid-2, .grid-3, .grid-4 {
                grid-template-columns: 1fr;
            }
        }

        /* Utility Classes */
        .text-center { text-align: center; }
        .mt-4 { margin-top: 16px; }
        .mb-4 { margin-bottom: 16px; }
        .hidden { display: none !important; }
        .flex { display: flex; }
        .items-center { align-items: center; }
        .justify-between { justify-content: space-between; }
        .gap-2 { gap: 8px; }
        .gap-4 { gap: 16px; }

        /* Price Flash Animation */
        @keyframes flash-green {
            0% { background: rgba(14, 203, 129, 0.3); }
            100% { background: transparent; }
        }

        @keyframes flash-red {
            0% { background: rgba(246, 70, 93, 0.3); }            100% { background: transparent; }
        }

        .flash-up {
            animation: flash-green 1s ease-out;
        }

        .flash-down {
            animation: flash-red 1s ease-out;
        }

        /* Badge */
        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-pro {
            background: linear-gradient(135deg, #f0b90b, #f0b90b);
            color: var(--bg-primary);
        }

        .badge-vip {
            background: linear-gradient(135deg, #9333ea, #ec4899);
            color: white;
        }

        /* Progress Bar */
        .progress-bar {
            height: 8px;
            background: var(--bg-tertiary);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-green));
            transition: width 0.3s;
        }

        /* Wallet Card */
        .wallet-card {
            background: linear-gradient(135deg, var(--bg-secondary), var(--bg-tertiary));
            border: 1px solid var(--border-color);
            border-radius: 16px;            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        .wallet-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(240, 185, 11, 0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        .wallet-balance {
            font-size: 36px;
            font-weight: bold;
            margin: 16px 0;
            color: var(--accent-blue);
        }

        .wallet-label {
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* Leaderboard */
        .leaderboard-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            background: var(--bg-tertiary);
            transition: all 0.3s;
        }

        .leaderboard-item:hover {
            background: var(--bg-secondary);
            transform: translateX(-4px);
        }

        .leaderboard-rank {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;            align-items: center;
            justify-content: center;
            font-weight: bold;
            background: var(--bg-secondary);
        }

        .leaderboard-rank.gold {
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            color: var(--bg-primary);
        }

        .leaderboard-rank.silver {
            background: linear-gradient(135deg, #c0c0c0, #e8e8e8);
            color: var(--bg-primary);
        }

        .leaderboard-rank.bronze {
            background: linear-gradient(135deg, #cd7f32, #e8945b);
            color: white;
        }

        .leaderboard-info {
            flex: 1;
        }

        .leaderboard-name {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .leaderboard-stats {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .leaderboard-profit {
            font-weight: bold;
            color: var(--accent-green);
        }

        /* Chat */
        .chat-container {
            height: 500px;
            display: flex;
            flex-direction: column;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;            padding: 16px;
            background: var(--bg-tertiary);
            border-radius: 8px;
            margin-bottom: 16px;
        }

        .chat-message {
            margin-bottom: 16px;
            padding: 12px;
            background: var(--bg-secondary);
            border-radius: 8px;
            border-right: 3px solid var(--accent-blue);
        }

        .chat-message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 12px;
        }

        .chat-username {
            font-weight: 600;
            color: var(--accent-blue);
        }

        .chat-time {
            color: var(--text-secondary);
        }

        .chat-text {
            color: var(--text-primary);
            line-height: 1.5;
        }

        .chat-input-container {
            display: flex;
            gap: 12px;
        }

        .chat-input {
            flex: 1;
            padding: 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
        }

        /* Signal Card */        .signal-card {
            background: var(--bg-secondary);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .signal-card::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 4px;
            height: 100%;
            background: var(--accent-green);
        }

        .signal-card.sell::after {
            background: var(--accent-red);
        }

        .signal-card:hover {
            border-color: var(--accent-blue);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .signal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .signal-pair {
            font-size: 20px;
            font-weight: bold;
        }

        .signal-type {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }
        .signal-type.long {
            background: rgba(14, 203, 129, 0.2);
            color: var(--accent-green);
        }

        .signal-type.short {
            background: rgba(246, 70, 93, 0.2);
            color: var(--accent-red);
        }

        .signal-details {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 16px;
        }

        .signal-detail {
            text-align: center;
            padding: 12px;
            background: var(--bg-tertiary);
            border-radius: 8px;
        }

        .signal-detail-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .signal-detail-value {
            font-size: 16px;
            font-weight: bold;
            color: var(--text-primary);
        }

        /* Heatmap */
        .heatmap-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 8px;
        }

        .heatmap-item {
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .heatmap-item:hover {
            transform: scale(1.05);
        }

        .heatmap-symbol {
            font-weight: 600;
            margin-bottom: 4px;
            font-size: 12px;
        }

        .heatmap-change {
            font-size: 14px;
            font-weight: bold;
        }

        /* Bot Configuration */
        .bot-config {
            background: var(--bg-tertiary);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .bot-config-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .bot-toggle {
            width: 50px;
            height: 26px;
            background: var(--bg-secondary);
            border-radius: 13px;
            position: relative;
            cursor: pointer;
            transition: all 0.3s;
        }

        .bot-toggle.active {
            background: var(--accent-green);
        }

        .bot-toggle-slider {
            position: absolute;
            top: 3px;
            right: 3px;
            width: 20px;            height: 20px;
            background: white;
            border-radius: 50%;
            transition: all 0.3s;
        }

        .bot-toggle.active .bot-toggle-slider {
            transform: translateX(-24px);
        }

        /* Risk Meter */
        .risk-meter {
            height: 12px;
            background: linear-gradient(90deg, 
                var(--accent-green) 0%, 
                var(--accent-green) 30%, 
                var(--accent-blue) 50%, 
                var(--accent-red) 100%);
            border-radius: 6px;
            position: relative;
            margin-top: 8px;
        }

        .risk-indicator {
            position: absolute;
            top: -3px;
            width: 18px;
            height: 18px;
            background: white;
            border: 3px solid var(--bg-primary);
            border-radius: 50%;
            transition: all 0.3s;
        }

        /* Timeframe Selector */
        .timeframe-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .timeframe-btn {
            padding: 6px 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;        }

        .timeframe-btn:hover,
        .timeframe-btn.active {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            color: var(--bg-primary);
        }

        /* Search Box */
        .search-box {
            position: relative;
            margin-bottom: 16px;
        }

        .search-input {
            width: 100%;
            padding: 12px 40px 12px 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
        }

        .search-icon {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        /* Tab Content */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: slideIn 0.3s ease-out;
        }

        /* Tooltip */
        .tooltip {
            position: relative;
        }

        .tooltip::after {
            content: attr(data-tooltip);            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            padding: 6px 12px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 12px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s;
            z-index: 100;
        }

        .tooltip:hover::after {
            opacity: 1;
            bottom: calc(100% + 8px);
        }

        /* Skeleton Loading */
        .skeleton {
            background: linear-gradient(90deg, var(--bg-tertiary) 25%, var(--bg-secondary) 50%, var(--bg-tertiary) 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 4px;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Custom Select */
        .custom-select {
            position: relative;
        }

        .custom-select-trigger {
            padding: 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .custom-select-dropdown {
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            right: 0;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            max-height: 300px;
            overflow-y: auto;
            z-index: 100;
            display: none;
        }

        .custom-select.active .custom-select-dropdown {
            display: block;
        }

        .custom-select-option {
            padding: 10px 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .custom-select-option:hover {
            background: var(--bg-tertiary);
        }

        /* Range Slider */
        .range-slider {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: var(--bg-tertiary);
            outline: none;
            -webkit-appearance: none;
        }

        .range-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--accent-blue);
            cursor: pointer;
            transition: all 0.3s;
        }

        .range-slider::-webkit-slider-thumb:hover {            transform: scale(1.2);
            box-shadow: 0 0 10px var(--accent-blue);

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {

            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .stat-label {

        .stat-value {

            color: var(--text-primary);
        }

        .stat-change {

        /* Footer */
        .footer {

        /* Connection Status */
        .connection-status {
            display: flex;            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: var(--bg-tertiary);
            border-radius: 20px;

        }

        .connection-dot {

        .connection-dot.disconnected {

        .volume-bar {

        .whale-alert {
